name: Android Debug APK

on:
  workflow_dispatch:
    inputs:
      application_id:
        description: "Android package name, e.g. com.hurt.tsdd"
        required: true
        default: "com.hurt.tsdd"
      api_base_url:
        description: "Business API base URL, e.g. https://api.example.com"
        required: false
        default: "https://api.botgate.cn"

jobs:
  build-debug:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Create local.properties
        run: |
          cat > local.properties <<EOF
          applicationId=${{ github.event.inputs.application_id }}
          EOF
          echo "local.properties created"

      - name: Patch default API base URL in TSApplication.kt
        run: |
          python3 - <<'PY'
          from pathlib import Path
          p = Path('app/src/main/java/com/test/demo2/TSApplication.kt')
          text = p.read_text(encoding='utf-8')
          old = 'apiURL = "https://api.botgate.cn"'
          new = 'apiURL = "${{ github.event.inputs.api_base_url }}"'
          if old not in text:
              raise SystemExit('Did not find default apiURL line in TSApplication.kt')
          p.write_text(text.replace(old, new, 1), encoding='utf-8')
          print('Patched TSApplication.kt default API URL')
          PY

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
