name: Android Debug Build

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Install Android SDK 35
        run: |
          yes | sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Create local.properties
        run: |
          echo "applicationId=com.tanwei.tangseng" > local.properties

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew clean :app:assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: tangseng-debug-apk
          path: app/build/outputs/apk/debug/*.apk
